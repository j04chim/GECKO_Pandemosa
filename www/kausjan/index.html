<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pandemosa - GECKO Institute</title>
<!--        <link rel="icon" href="logo.ico">
        <link rel="apple-touch-icon" href="logo.png">-->
        <link rel="stylesheet" href="assets/css/style.css">
		<style>
			* {
				font-family: sans-serif;
			}
			html {
				background-color: #272727;
			}
			body {
				padding: 10px;
			}
			.opts {
				display: flex;
				border-bottom: black 2px solid;
				margin-bottom: 10px;
			}
			.opt {
				display: flex;
				flex-direction: column;
				margin-right: 10px;
				margin-bottom: 10px;
			}
			.opt > input, .opt > select {
				border: solid 2px black;
				border-radius: 10px;
				background-color: #7c7c7c;
				padding: 5px;
			}
			.api {
				margin: 10px;
				padding: 10px;
				border: black 2px solid;
				border-radius: 20px;
				background-color: #343434;
				color: #eaf0af;
			}
			.api > button {
				border: #6eb3dc 1px solid;
				background-color: #2883b8;
				padding: 10px;
				border-radius: 10px;
				transition-duration: 0.25s;
				color: #eaf0af;
			}
			.api > button:hover {
				background-color: #2d6c91;
				border-color: #2d6c91;
			}
			.output {
				height: 500px;
				width: 100%;
				border: black 2px solid;
				border-radius: 20px;
				background-color: #525050;
				overflow: scroll;
				color: #d2db84;
			}
			.res {
				padding: 10px;
			}
		</style>
	</head>
	<body>
		<div class="api">
			<button id="c_s">Create session</button>
		</div>
		<div class="api">
			<div class="opts">
				<div class="opt">
					<label for="id">ID</label>
					<input id="id" type="text">
				</div>
				<div class="opt">
					<label for="dt">Date</label>
					<input id="dt" type="date">
				</div>
				<div class="opt">
					<label for="d_l">Detail level</label>
					<input id="d_l" type="number">
				</div>
				<div class="opt">
					<label for="i_d">Decision relevance</label>
					<input id="i_d" type="number">
				</div>
				<div class="opt">
					<label for="u_l">Uncertainty level</label>
					<select id="u_l">
						<option value="high">High</option>
						<option value="medium">Medium</option>
						<option value="low">Low</option>
						<option value=""></option>
					</select>
				</div>
			</div>
			<button id="f_e">Fetch events</button>
		</div>
		<div class="api">
			<div class="opts">
				<div class="opt">
					<label for="sid">Session ID</label>
					<input id="sid" type="number">
				</div>
			</div>
			<button id="g_s">Get session</button>
		</div>
		<div class="api">
			<div class="opts">
				<div class="opt">
					<label for="gn">Session ID</label>
					<input id="gn" type="number">
				</div>
			</div>
			<button id="g_n">Get notes</button>
		</div>
		<div class="api">
			<div class="opts">
				<div class="opt">
					<label for="sid2">Session ID</label>
					<input id="sid2" type="number">
				</div>
				<div class="opt">
					<label for="rid">Report ID</label>
					<input id="rid" type="number">
				</div>
				<div class="opt">
					<label for="ac">Action</label>
					<select id="ac">
						<option value="lockdown">Lockdown</option>
						<option value="vaccin">Vaccin</option>
						<option value="cat">Cat</option>
					</select>
				</div>
				<div class="opt">
					<label for="des">Description</label>
					<input id="des" type="text">
				</div>
			</div>
            <button id="d_a">Do action</button>
        </div>

        <div class="api">
			<div class="opts">
				<div class="opt">
					<label for="sid3">Session ID</label>
					<input id="sid3" type="number">
				</div>
				<div class="opt">
					<label for="tt">Title</label>
					<input id="tt" type="text">
				</div>
				<div class="opt">
					<label for="cc">Content</label>
					<input id="cc" type="text">
				</div>
			</div>
            <button id="c_n">Create note</button>
        </div>

        <div class="output">
			<pre class="res">

			</pre>
        </div>

        <script>
function buildUrl(path, params = {}) {
  const url = new URL(path, 'http://127.0.0.1:8080');
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) url.searchParams.set(k, String(v));
  });
  return url.toString();
}

async function getJson(url) {
  const res = await fetch(url, { method: 'GET' });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  return res.json();
}

function getEvents({ id, dt, dl, dr, ul } = {}) {
  const url = buildUrl('/getEvents', {
    id,
    dt,
    dl,
    dr,
    ul
  });
  return getJson(url);
}

function createSession(params = {}) {
  const url = buildUrl('/createSession');
  return getJson(url);
}

function getSession(id) {
  if (id === undefined || id === null) return Promise.reject(new Error('id is required'));
  const url = buildUrl('/getSession', { id });
  return getJson(url);
}

function createNote({ sd, tt, ct } = {}) {
  if (!sd) return Promise.reject(new Error('sessionId is required'));
  const url = buildUrl('/createNote', {
    sd,
    tt,
    ct
  });
  return getJson(url);
}

function getNotes(sd) {
  if (sd === undefined || sd === null) return Promise.reject(new Error('sessionId is required'));
  const url = buildUrl('/getNotes', { sd });
  return getJson(url);
}

function createAction({ sd, rd, ac, ds } = {}) {
  if (!sd) return Promise.reject(new Error('sessionId is required'));
  if (!ac) return Promise.reject(new Error('action is required'));
  const url = buildUrl('/createAction', {
    sd,
    rd,
    ac,
    ds
  });
  return getJson(url);
}

document.querySelectorAll('button').forEach(btn => btn.addEventListener('click', async (e) => {
  const out = document.querySelector('.res');
  try {
    let result;
    switch (e.target.id) {
      case 'c_s':
        result = await createSession({ name: 'New Session' });
        break;
      case 'g_s':
        result = await getSession(document.getElementById('sid').value);
        break;
      case 'g_n':
        result = await getNotes(document.getElementById('gn').value);
        break;
      case 'd_a':
        result = await createAction({
          sd: document.getElementById('sid2').value,
          rd: document.getElementById('rid').value,
          ac: document.getElementById('ac').value,
          ds: document.getElementById('des').value
        });
        break;
      case 'c_n':
        result = await createNote({
          sd: document.getElementById('sid3').value,
          tt: document.getElementById('tt').value,
          ct: document.getElementById('cc').value
        });
        break;
      case 'f_e':
        result = await getEvents({
          id: document.getElementById('id').value || undefined,
          dt: document.getElementById('dt').value || undefined,
          dl: document.getElementById('d_l').value || undefined,
          dr: document.getElementById('i_d').value || undefined,
          ul: document.getElementById('u_l').value || undefined
        });
    }
    out.textContent = JSON.stringify(result, null, 2);
  } catch (err) {
    out.textContent = `Error: ${err.message}`;
  }
}));
        </script>

    </body>
</html>
