name: CMake Linux

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: sudo apt install -y libasio-dev libsqlite3-dev

    - name: Configure CMake
      run: cmake .

    - name: Build
      run: make

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ./Kausjan_test
